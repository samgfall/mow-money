<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mow Money 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--green-dark:#2d5a27;--green-mid:#4a8c3f;--green-light:#6db85a;--green-pale:#e8f5e3;
--earth:#8B7355;--earth-light:#d4c5a9;--sky:#87CEEB;
--bg:#f0f4e8;--card:#fff;--text:#1a2e1a;--text-light:#5a6e5a;
--danger:#d44;--warning:#e8a735;--success:#4a8c3f;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
input{font-family:inherit;outline:none}

/* SCREENS */
.screen{display:none;position:absolute;inset:0;overflow-y:auto;overflow-x:hidden}
.screen.active{display:flex;flex-direction:column}

/* TITLE SCREEN */
#title-screen{background:linear-gradient(135deg,#2d5a27 0%,#4a8c3f 50%,#6db85a 100%);
justify-content:center;align-items:center;text-align:center;padding:20px}
#title-screen h1{font-size:clamp(2rem,8vw,3.5rem);color:#fff;font-weight:900;text-shadow:2px 4px 8px rgba(0,0,0,.3);margin-bottom:4px}
#title-screen .subtitle{color:rgba(255,255,255,.85);font-size:clamp(.9rem,3vw,1.1rem);margin-bottom:32px;font-weight:500}
#title-screen .logo-icon{font-size:4rem;margin-bottom:16px;filter:drop-shadow(2px 4px 6px rgba(0,0,0,.2))}
#title-screen input{width:min(300px,80vw);padding:14px 18px;border-radius:var(--radius);border:2px solid rgba(255,255,255,.3);
background:rgba(255,255,255,.15);color:#fff;font-size:1.1rem;text-align:center;backdrop-filter:blur(10px);margin-bottom:16px}
#title-screen input::placeholder{color:rgba(255,255,255,.5)}
#title-screen .btn-start{background:#fff;color:var(--green-dark);padding:14px 48px;border-radius:var(--radius);
font-size:1.1rem;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:transform .15s}
#title-screen .btn-start:active{transform:scale(.95)}
#title-screen .btn-continue{background:rgba(255,255,255,.2);color:#fff;padding:12px 36px;border-radius:var(--radius);
font-size:.95rem;font-weight:600;margin-top:12px;border:1px solid rgba(255,255,255,.3)}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;
background:var(--green-dark);color:#fff;position:sticky;top:0;z-index:100;min-height:52px}
.top-bar .cash{font-weight:700;font-size:1.05rem}
.top-bar .week-info{font-size:.8rem;opacity:.85}
.top-bar .rep{display:flex;align-items:center;gap:4px;font-size:.85rem}

/* BOTTOM NAV */
.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;
border-top:1px solid #e0e0e0;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;
font-size:.65rem;color:var(--text-light);background:none;gap:2px;transition:color .2s}
.bottom-nav button.active{color:var(--green-mid)}
.bottom-nav button .nav-icon{font-size:1.3rem}

/* DASHBOARD */
#dashboard{padding-bottom:70px}
.dash-greeting{padding:16px;font-size:1.1rem;font-weight:600}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.stat-card .stat-label{font-size:.7rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-card .stat-value{font-size:1.3rem;font-weight:700;margin-top:4px}
.stat-card .stat-sub{font-size:.75rem;color:var(--text-light);margin-top:2px}
.stat-card.highlight{background:var(--green-dark);color:#fff}
.stat-card.highlight .stat-label{color:rgba(255,255,255,.7)}
.stat-card.highlight .stat-sub{color:rgba(255,255,255,.6)}

.section-title{padding:16px 16px 8px;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light)}
.action-cards{display:flex;flex-direction:column;gap:8px;padding:0 16px 16px}
.action-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s}
.action-card:active{transform:scale(.98)}
.action-card .ac-icon{font-size:1.5rem;width:44px;height:44px;border-radius:10px;
display:flex;align-items:center;justify-content:center;background:var(--green-pale);flex-shrink:0}
.action-card .ac-info{flex:1}
.action-card .ac-title{font-weight:600;font-size:.95rem}
.action-card .ac-desc{font-size:.78rem;color:var(--text-light);margin-top:2px}
.action-card .ac-arrow{color:var(--text-light);font-size:1.2rem}

.alert-banner{margin:0 16px 12px;padding:12px 16px;border-radius:var(--radius);font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:8px}
.alert-banner.warning{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.alert-banner.danger{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.alert-banner.info{background:#d1ecf1;color:#0c5460;border:1px solid #bee5eb}
.alert-banner.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}

/* ADVANCE WEEK BUTTON */
.advance-week-btn{margin:8px 16px 16px;padding:16px;border-radius:var(--radius);background:linear-gradient(135deg,var(--green-mid),var(--green-dark));
color:#fff;font-size:1.05rem;font-weight:700;box-shadow:0 4px 16px rgba(45,90,39,.3);transition:transform .15s;text-align:center}
.advance-week-btn:active{transform:scale(.97)}
.advance-week-btn.disabled{opacity:.5;pointer-events:none}

/* CONTRACTS */
#contracts{padding-bottom:70px}
.contract-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin:0 16px 10px}
.contract-header{display:flex;justify-content:space-between;align-items:center}
.contract-name{font-weight:600;font-size:.95rem}
.contract-price{font-weight:700;color:var(--green-mid);font-size:1rem}
.contract-details{display:flex;gap:12px;margin-top:6px;font-size:.78rem;color:var(--text-light);flex-wrap:wrap}
.contract-tag{padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:600}
.contract-tag.easy{background:#d4edda;color:#155724}
.contract-tag.moderate{background:#fff3cd;color:#856404}
.contract-tag.hard{background:#f8d7da;color:#721c24}
.contract-status{margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.contract-status .mowed{font-size:.78rem;font-weight:600;color:var(--success)}
.contract-status .not-mowed{font-size:.78rem;font-weight:600;color:var(--danger)}
.contract-actions{display:flex;gap:8px;margin-top:8px}
.contract-actions button{padding:8px 14px;border-radius:8px;font-size:.78rem;font-weight:600;flex:1}
.btn-mow{background:var(--green-mid);color:#fff}
.btn-assign{background:var(--green-pale);color:var(--green-dark)}
.btn-drop{background:#f8d7da;color:var(--danger);font-size:.72rem!important}
.new-contracts-section{margin:0 16px 10px;padding:14px;background:var(--green-pale);border-radius:var(--radius);border:2px dashed var(--green-mid)}
.new-contracts-section h3{font-size:.9rem;margin-bottom:8px}

/* SHOP */
#shop{padding-bottom:70px}
.shop-category{margin-bottom:8px}
.shop-item{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin:0 16px 10px}
.shop-item-header{display:flex;justify-content:space-between;align-items:flex-start}
.shop-item-name{font-weight:700;font-size:.95rem}
.shop-item-price{font-weight:700;color:var(--green-mid);white-space:nowrap}
.shop-item-stats{font-size:.78rem;color:var(--text-light);margin-top:4px}
.shop-item-owned{font-size:.75rem;color:var(--success);font-weight:600;margin-top:4px}
.btn-buy{padding:10px 20px;border-radius:8px;background:var(--green-mid);color:#fff;font-weight:600;
font-size:.85rem;margin-top:8px;width:100%;transition:transform .1s}
.btn-buy:active{transform:scale(.97)}
.btn-buy:disabled{opacity:.4;pointer-events:none}

/* EMPLOYEES */
.employee-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin:0 16px 10px}
.emp-header{display:flex;justify-content:space-between;align-items:center}
.emp-name{font-weight:600}
.emp-level{font-size:.75rem;padding:2px 8px;border-radius:6px;font-weight:600}
.emp-level.rookie{background:#fff3cd;color:#856404}
.emp-level.experienced{background:#d1ecf1;color:#0c5460}
.emp-level.expert{background:#d4edda;color:#155724}
.emp-wage{font-size:.85rem;color:var(--text-light);margin-top:4px}
.emp-assignment{font-size:.8rem;margin-top:6px;color:var(--green-mid);font-weight:500}
.btn-hire{padding:10px 20px;border-radius:8px;background:var(--green-mid);color:#fff;font-weight:600;font-size:.85rem;margin-top:8px;width:100%}
.btn-fire{padding:8px 16px;border-radius:8px;background:#f8d7da;color:var(--danger);font-weight:600;font-size:.78rem;margin-top:8px}

/* MAP */
#map-screen{padding-bottom:70px}
#map-canvas{width:100%;aspect-ratio:1;background:#c8e6c0;border-radius:var(--radius);margin:16px;max-width:calc(100% - 32px)}

/* MOWING GAME */
#mowing-screen{background:#000;overflow:hidden}
#mowing-screen .mow-hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
padding:12px 16px;background:rgba(0,0,0,.5);color:#fff;z-index:10;font-size:.85rem;font-weight:600}
#mow-canvas{width:100%;height:100%;display:block}
/* old fixed joystick removed — see dynamic joystick CSS above */
.mow-complete-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;
justify-content:center;align-items:center;z-index:30;color:#fff;text-align:center;padding:20px}
.mow-complete-overlay h2{font-size:1.8rem;margin-bottom:8px}
.mow-complete-overlay .stars{font-size:2rem;margin:12px 0}
.mow-complete-overlay .mow-stats{font-size:.95rem;opacity:.8;margin:4px 0}
.mow-complete-overlay button{margin-top:20px;padding:14px 40px;border-radius:var(--radius);
background:var(--green-mid);color:#fff;font-size:1rem;font-weight:700}
.mow-pause-btn{position:absolute;top:12px;right:16px;z-index:20;background:rgba(255,255,255,.2);
color:#fff;padding:8px 12px;border-radius:8px;font-size:.8rem;font-weight:600}

/* WEEK SUMMARY */
#week-summary{background:linear-gradient(180deg,var(--green-dark) 0%,var(--bg) 40%);justify-content:flex-start;padding-top:0}
.summary-header{padding:24px 16px 16px;color:#fff;text-align:center}
.summary-header h2{font-size:1.4rem;font-weight:700}
.summary-header .week-num{font-size:.9rem;opacity:.7}
.summary-body{padding:0 16px 20px;flex:1}
.summary-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.summary-card h3{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:10px}
.summary-line{display:flex;justify-content:space-between;padding:4px 0;font-size:.9rem}
.summary-line.total{border-top:2px solid var(--green-mid);margin-top:8px;padding-top:8px;font-weight:700;font-size:1rem}
.summary-line .positive{color:var(--success)}
.summary-line .negative{color:var(--danger)}
.summary-event{padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:.85rem;display:flex;align-items:center;gap:8px}
.summary-event.good{background:#d4edda;color:#155724}
.summary-event.bad{background:#f8d7da;color:#721c24}
.summary-event.neutral{background:#d1ecf1;color:#0c5460}
.btn-continue-week{padding:16px;border-radius:var(--radius);background:var(--green-mid);color:#fff;
font-size:1.05rem;font-weight:700;margin:8px 16px 20px;text-align:center}

/* ADVERTISING MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;justify-content:center;align-items:flex-end}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 16px;max-height:80vh;overflow-y:auto;width:100%;max-width:500px}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;font-size:1.5rem;color:var(--text-light);margin-top:-4px}
.modal .shop-item{margin:0 0 10px;box-shadow:none;border:1px solid #e0e0e0}

/* ASSIGN MODAL */
.assign-option{padding:12px;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.assign-option:active{background:var(--green-pale)}
.assign-option .ao-name{font-weight:600;font-size:.9rem}
.assign-option .ao-info{font-size:.78rem;color:var(--text-light)}

/* SCROLLBAR */
.screen::-webkit-scrollbar{width:4px}
.screen::-webkit-scrollbar-thumb{background:var(--green-mid);border-radius:2px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* DYNAMIC JOYSTICK */
.joystick-touch-area{position:absolute;bottom:0;left:0;width:50%;height:60%;z-index:20;touch-action:none}
.dyn-joystick-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);
position:absolute;pointer-events:none;display:none}
.dyn-joystick-knob{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.45);
position:absolute;top:35px;left:35px;pointer-events:none}

/* THROTTLE SLIDER */
/* Twin Levers (zero-turn style) */
.twin-levers{position:absolute;bottom:40px;left:0;right:0;display:flex;justify-content:space-between;padding:0 30px;z-index:20;pointer-events:none}
.lever-zone{width:60px;height:200px;display:flex;flex-direction:column;align-items:center;pointer-events:auto;touch-action:none}
.lever-track{width:12px;height:160px;border-radius:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);position:relative}
.lever-handle{width:40px;height:20px;border-radius:6px;background:rgba(255,255,255,.7);position:absolute;left:50%;transform:translateX(-50%);top:50%;margin-top:-10px;
box-shadow:0 2px 6px rgba(0,0,0,.3);transition:top 0.05s}
.lever-label{color:rgba(255,255,255,.7);font-size:.7rem;font-weight:700;margin-top:6px;text-transform:uppercase}
.throttle-area{position:absolute;bottom:80px;right:16px;width:44px;height:180px;z-index:20;touch-action:none;
display:flex;flex-direction:column;align-items:center}
.throttle-track{width:8px;height:140px;border-radius:4px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
position:relative}
.throttle-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;
background:linear-gradient(to top,var(--green-mid),var(--warning),var(--danger));transition:height .1s}
.throttle-handle{width:28px;height:14px;border-radius:4px;background:#fff;position:absolute;left:50%;
transform:translateX(-50%);box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:grab}
.throttle-label{color:rgba(255,255,255,.7);font-size:.6rem;font-weight:700;text-transform:uppercase;
letter-spacing:.5px;margin-top:4px}

/* MOWER HEALTH BAR (HUD) */
.hud-health-bar{display:flex;align-items:center;gap:6px}
.hud-health-track{width:80px;height:8px;border-radius:4px;background:rgba(255,255,255,.2);overflow:hidden}
.hud-health-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}
.hud-health-text{font-size:.7rem;min-width:32px}
.hud-speed{font-size:.75rem;display:flex;align-items:center;gap:4px}
.hud-row{display:flex;justify-content:space-between;align-items:center;padding:2px 16px 6px;
background:rgba(0,0,0,.5);color:#fff;z-index:10;font-size:.8rem}

/* BREAKDOWN OVERLAY */
.breakdown-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;
justify-content:center;align-items:center;z-index:25;color:#fff;text-align:center;pointer-events:none}
.breakdown-overlay h3{font-size:1.3rem;margin-bottom:8px}
.breakdown-overlay .countdown{font-size:2rem;font-weight:800}

/* ROUTE INFO */
.route-info{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.route-tag{padding:2px 8px;border-radius:6px;font-size:.7rem;font-weight:600;background:#d1ecf1;color:#0c5460}
.route-tag.bonus{background:#d4edda;color:#155724}

/* TRUCK BADGE */
.truck-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:600;background:#e8f0fe;color:#1a56db}
.truck-badge.none{background:#f8d7da;color:#721c24}

/* SEASON BAR */
.season-bar{display:flex;align-items:center;gap:6px;padding:4px 16px 8px;font-size:.78rem;color:var(--text-light)}
.season-icon{font-size:1rem}
.weather-badge{padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:600;margin-left:auto}
.weather-badge.clear{background:#d4edda;color:#155724}
.weather-badge.rain{background:#d1ecf1;color:#0c5460}
.weather-badge.storm{background:#f8d7da;color:#721c24}
.weather-badge.drought{background:#fff3cd;color:#856404}

/* LOAN */
.loan-info{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:12px;margin:0 16px 10px;font-size:.85rem}

/* RESPONSIVE */
@media(min-width:600px){
.stats-grid{grid-template-columns:repeat(4,1fr)}
.action-cards{flex-direction:row;flex-wrap:wrap}
.action-card{flex:1;min-width:200px}
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
<div class="logo-icon">&#127793;</div>
<h1>MOW MONEY</h1>
<p class="subtitle">Build Your Lawn Care Empire</p>
<input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
<button class="btn-start" onclick="startNewGame()">Start Company</button>
<button class="btn-continue" id="btn-continue" style="display:none" onclick="loadGame()">Continue Game</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
<div class="top-bar">
<div>
<div class="cash" id="top-cash">$2,000</div>
<div class="week-info" id="top-week">Week 1 - Spring</div>
</div>
<div class="rep" id="top-rep"></div>
</div>
<div class="season-bar" id="season-bar"></div>
<div id="alert-area"></div>
<div class="dash-greeting" id="dash-greeting">Welcome!</div>
<div class="stats-grid" id="stats-grid"></div>
<div class="section-title">Quick Actions</div>
<div class="action-cards" id="action-cards"></div>
<div id="loan-area"></div>
<button class="advance-week-btn" id="advance-btn" onclick="advanceWeek()">Advance to Next Week &#9654;</button>
</div>

<!-- CONTRACTS -->
<div id="contracts" class="screen">
<div class="top-bar"><div style="font-weight:600">Contracts</div><div class="cash" id="contracts-cash"></div></div>
<div class="section-title" id="contracts-count">Your Contracts</div>
<div id="contracts-list"></div>
<div id="available-contracts"></div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<div class="top-bar"><div style="font-weight:600">Shop</div><div class="cash" id="shop-cash"></div></div>
<div class="section-title">Mowers</div>
<div id="mower-list"></div>
<div class="section-title">Vehicles</div>
<div id="vehicle-list"></div>
<div class="section-title" id="shop-ads">Advertising</div>
<div id="ad-list"></div>
</div>

<!-- EMPLOYEES -->
<div id="employees-screen" class="screen">
<div class="top-bar"><div style="font-weight:600">Employees</div><div class="cash" id="emp-cash"></div></div>
<div class="section-title">Your Crew</div>
<div id="employee-list"></div>
<div class="section-title">Available for Hire</div>
<div id="hire-list"></div>
</div>

<!-- MAP -->
<div id="map-screen" class="screen">
<div class="top-bar"><div style="font-weight:600">Town Map</div><div class="cash" id="map-cash"></div></div>
<canvas id="map-canvas"></canvas>
</div>

<!-- MOWING GAME -->
<div id="mowing-screen" class="screen">
<div class="mow-hud">
<div id="mow-progress">0% Mowed</div>
<div id="mow-timer">0:00</div>
<div id="mow-yard-name">Yard</div>
</div>
<div class="hud-row">
<div class="hud-health-bar" id="hud-health">
<span style="font-size:.7rem">&#128295;</span>
<div class="hud-health-track"><div class="hud-health-fill" id="hud-health-fill" style="width:100%;background:var(--success)"></div></div>
<span class="hud-health-text" id="hud-health-text">100%</span>
</div>
<div class="hud-speed" id="hud-speed">&#9881; 50%</div>
</div>
<canvas id="mow-canvas"></canvas>
<div class="joystick-touch-area" id="joystick-touch-area">

<script>
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
if(!Array.isArray(r))r=[r||0];
const tl=r[0]||0,tr=r[1]||tl,br=r[2]||tl,bl=r[3]||tr;
this.moveTo(x+tl,y);this.lineTo(x+w-tr,y);this.quadraticCurveTo(x+w,y,x+w,y+tr);
this.lineTo(x+w,y+h-br);this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
this.lineTo(x+bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-bl);
this.lineTo(x,y+tl);this.quadraticCurveTo(x,y,x+tl,y);this.closePath();return this;
};
}

// ===== HELPERS =====
function $(id){return document.getElementById(id)}
function fmt(n){return '$'+Math.round(n).toLocaleString()}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function genName(){return pick(FIRST_NAMES)+' '+pick(LAST_NAMES)}
function genAddress(){return rng(100,9999)+' '+pick(STREET_NAMES)+' '+pick(STREET_TYPES)}

function getSeason(week){
const m = ((week - 1) % 52);
if(m < 13) return 'Spring';
if(m < 26) return 'Summer';
if(m < 39) return 'Fall';
return 'Winter';
}

function generateContract(){
const t = pick(YARD_TYPES);
const priceVar = rng(-5, 15);
return {
id: Date.now() + Math.random(),
customerName: genName(),
address: genAddress(),
type: t.type,
label: t.label,
price: t.price + priceVar,
difficulty: t.difficulty,
baseTime: t.baseTime,
satisfaction: 3,
weeksActive: 0,
mapX: rng(20, 280),
mapY: rng(20, 280)
};
}

function generateEmployee(){
const levels = [{level:'Rookie',wage:18,skill:0.6},{level:'Experienced',wage:26,skill:0.8},{level:'Expert',wage:35,skill:0.95}];
const w = Math.random();
const l = w < 0.5 ? levels[0] : w < 0.85 ? levels[1] : levels[2];
return {
id: Date.now() + Math.random(),
name: genName(),
level: l.level,
wage: l.wage,
skill: l.skill,
assignedContracts: [],
morale: 80 + rng(0,20)
};
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
$(id).classList.add('active');
document.querySelectorAll('.bottom-nav button').forEach(b=>{
b.classList.toggle('active', b.dataset.screen===id);
});
if(id==='dashboard') renderDashboard();
else if(id==='contracts') renderContracts();
else if(id==='shop') renderShop();
else if(id==='employees-screen') renderEmployees();
else if(id==='map-screen') renderMap();
}

function showModal(html){
$('modal-content').innerHTML = html;
$('modal').style.display='flex';
}
function closeModal(){$('modal').style.display='none'}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal()});

// ===== START / LOAD =====
function startNewGame(){
const name = $('player-name').value.trim();
if(!name) { $('player-name').style.borderColor='#d44'; return; }
G = defaultState(name);
// Generate starting contracts
for(let i=0;i<3;i++) G.contracts.push(generateContract());
// Generate some available contracts
for(let i=0;i<2;i++) G.pendingContracts.push(generateContract());
saveGame();
$('bottom-nav').style.display='flex';
showScreen('dashboard');
}

function loadGame(){
const data = sessionStorage.getItem('lawn_tycoon_save');
if(data){G=JSON.parse(data);$('bottom-nav').style.display='flex';showScreen('dashboard')}
}

function saveGame(){
sessionStorage.setItem('lawn_tycoon_save', JSON.stringify(G));
}

// Enter key to start
$('player-name').addEventListener('keydown',e=>{if(e.key==='Enter')startNewGame()});

// Check for save on load
if(sessionStorage.getItem('lawn_tycoon_save')){
$('btn-continue').style.display='inline-block';
}

const weekExp = calcWeeklyExpenses();
$('stats-grid').innerHTML = `
<div class="stat-card highlight"><div class="stat-label">Cash</div><div class="stat-value">${fmt(G.cash)}</div><div class="stat-sub">Available</div></div>
<div class="stat-card"><div class="stat-label">Weekly Revenue</div><div class="stat-value">${fmt(weekRev)}</div><div class="stat-sub">${G.contracts.length} contracts</div></div>

// Actions

</div>

// Loan info
let loanHtml = '';
if(G.mowerLoan > 0) loanHtml += `<div class="loan-info">&#127974; Mower Loan: ${fmt(G.mowerLoan)} remaining (${fmt(G.mowerLoanPayment)}/wk)</div>`;
if(G.truckPayment > 0) loanHtml += `<div class="loan-info">&#128666; Truck Payment: ${fmt(G.truckPayment)}/mo</div>`;
$('loan-area').innerHTML = loanHtml;

// Advance button
const canAdvance = G.season==='Winter' || unmowed === 0;
$('advance-btn').className = 'advance-week-btn' + (canAdvance?'':' disabled');
$('advance-btn').textContent = canAdvance ? 'Advance to Next Week \u25B6' : `Mow ${unmowed} remaining yard${unmowed!==1?'s':''} first`;

function updateTopBar(){
$('top-cash').textContent = fmt(G.cash);
$('top-week').textContent = `Week ${G.week} - ${G.season}`;
$('top-rep').innerHTML = `${G.reputation.toFixed(1)} &#11088;`;
['contracts-cash','shop-cash','emp-cash','map-cash'].forEach(id=>{
const el=$(id);if(el)el.textContent=fmt(G.cash);
});
}

function getRepLabel(r){
if(r>=4.5)return'Outstanding';if(r>=4)return'Excellent';if(r>=3.5)return'Good';
if(r>=3)return'Average';if(r>=2)return'Below Average';return'Poor';
}

function calcWeeklyRevenue(){
if(G.season==='Winter') return 0;
return G.contracts.reduce((s,c)=>s+c.price,0);
}

function calcWeeklyExpenses(){
let exp = 0;
// Gas per yard (route-aware)
const route = calcRouteInfo();
exp += route.totalGas;
// Employee wages (est 2hrs per yard)
G.employees.forEach(e=>{
exp += e.assignedContracts.length * 2 * e.wage;
});
// Truck gas costs
(G.ownedTrucks||[]).forEach(t=>{
if(t.assignedTo) exp += t.gasCost / 4;
});
// Insurance
exp += G.insurance / 4;
// Mower loan
if(G.mowerLoan > 0) exp += G.mowerLoanPayment;
// Truck payments
(G.ownedTrucks||[]).forEach(t=>{
if(t.loanLeft > 0) exp += t.monthlyPayment / 4;
});
// Website
if(G.hasWebsite) exp += G.websiteCost / 4;
// Advertising
if(G.advertisingActive==='Local Ads') exp += 200;
// Maintenance
exp += calcWeeklyRevenue() * 0.05;
return exp;
}

// ===== GAS & ROUTE HELPERS =====
function calcContractGasCost(c){
const yt = YARD_TYPES.find(y=>y.type===c.type);
const baseGas = (yt ? yt.baseTime/15 : 3);
return Math.round((baseGas * (G.gasPrice||3.50) / 3.50) * 100) / 100;
}

function calcRouteInfo(){
if(G.contracts.length < 2) return {totalDist:0, bonus:false, totalGas:0};
const hqX=150, hqY=150;
let totalDist=0;
const sorted = [...G.contracts].sort((a,b)=>{
const da=Math.sqrt((a.mapX-hqX)**2+(a.mapY-hqY)**2);
const db=Math.sqrt((b.mapX-hqX)**2+(b.mapY-hqY)**2);
return da-db;
});
let px=hqX, py=hqY;
sorted.forEach(c=>{
totalDist += Math.sqrt((c.mapX-px)**2+(c.mapY-py)**2);
px=c.mapX; py=c.mapY;
});
const avgDist = totalDist / G.contracts.length;
const bonus = avgDist < 60;
let totalGas = 0;
G.contracts.forEach(c=>{ totalGas += calcContractGasCost(c); });
const distMult = Math.max(0.8, Math.min(1.5, totalDist / (G.contracts.length * 80)));
totalGas = Math.round(totalGas * distMult * 100)/100;
if(bonus) totalGas = Math.round(totalGas * 0.8 * 100)/100;
return {totalDist: Math.round(totalDist), bonus, totalGas, distMult};
}

</div>`;
let html = '';
G.contracts.forEach(c=>{
const mowed = G.weeklyMowed[c.id];

<div class="contract-header">
<div>
<div class="contract-name">${c.customerName}</div>
<div style="font-size:.75rem;color:var(--text-light)">${c.address}</div>
</div>

</div>
<div class="contract-details">

<span>&#11088; ${c.satisfaction}/5</span>
<span class="route-tag">&#9981; ~${fmt(gasCost)} gas</span>
${assignedEmp?`<span>&#128100; ${assignedEmp.name}</span>`:''}
</div>
<div class="contract-status">
${isWinter ? '<span style="font-size:.78rem;color:var(--text-light)">Winter break</span>' :
mowed ? '<span class="mowed">&#9989; Mowed</span>' : '<span class="not-mowed">&#10060; Not mowed</span>'}
</div>
${!isWinter && !mowed ? `<div class="contract-actions">
<button class="btn-mow" onclick="startMowing('${c.id}')">&#127793; Mow It</button>
${G.employees.length>0?`<button class="btn-assign" onclick="showAssignModal('${c.id}')">&#128100; Assign</button>`:''}
<button class="btn-drop" onclick="dropContract('${c.id}')">Drop</button>
</div>` : ''}
</div>`;
});
$('contracts-list').innerHTML = html || '<div style="padding:16px;color:var(--text-light);text-align:center">No contracts yet</div>';

// Available contracts
let avail = '';
if(G.pendingContracts.length > 0){
avail = `<div class="new-contracts-section"><h3>&#128196; Available Contracts</h3>`;
G.pendingContracts.forEach(c=>{
avail += `<div class="contract-card" style="box-shadow:none;margin:8px 0;border:1px solid #e0e0e0">
<div class="contract-header">
<div><div class="contract-name">${c.customerName}</div><div style="font-size:.75rem;color:var(--text-light)">${c.address}</div></div>
<div class="contract-price">${fmt(c.price)}/wk</div>
</div>
<div class="contract-details"><span>${c.label}</span><span class="contract-tag ${c.difficulty}">${c.difficulty}</span></div>
<button class="btn-mow" style="margin-top:8px;width:100%" onclick="acceptContract('${c.id}')">Accept Contract</button>
</div>`;
});
avail += '</div>';
}
$('available-contracts').innerHTML = avail;
}

function acceptContract(id){
const idx = G.pendingContracts.findIndex(c=>String(c.id)===String(id));
if(idx===-1) return;
G.contracts.push(G.pendingContracts[idx]);
G.pendingContracts.splice(idx,1);
saveGame();
renderContracts();
}

function dropContract(id){
G.contracts = G.contracts.filter(c=>String(c.id)!==String(id));
// Remove from employee assignments
G.employees.forEach(e=>{e.assignedContracts=e.assignedContracts.filter(cid=>String(cid)!==String(id))});
delete G.weeklyMowed[id];
G.reputation = Math.max(1, G.reputation - 0.1);
saveGame();
renderContracts();
}

const c = G.contracts.find(c2=>String(c2.id)===String(contractId));

<p style="font-size:.85rem;color:var(--text-light);margin-bottom:12px">to ${c.customerName}'s ${c.label}</p>`;
const availMowers = G.mowers.filter(m=>m.owned).length;
G.employees.forEach(e=>{

function buyMower(id){
const m = MOWERS.find(m2=>m2.id===id);
if(!m || G.cash < m.price) return;
G.cash -= m.price;

saveGame();
renderShop();
}

function repairMowerTier(id, tier){
const m = G.mowers.find(m2=>m2.id===id && m2.owned);
if(!m) return;
const base = MOWERS.find(m2=>m2.id===id);
let cost, restore;
if(tier==='minor'){cost=Math.round(base.price*0.03);restore=30;}
else if(tier==='major'){cost=Math.round(base.price*0.08);restore=70;}
else{cost=Math.round(base.price*0.15);restore=100;}
if(G.cash < cost) return;
G.cash -= cost;
if(tier==='full'){m.health=100;m.condition=Math.min(100,m.condition+20);}
else{m.health=Math.min(100,(m.health||100)+restore);m.condition=Math.min(100,m.condition+Math.round(restore/3));}
saveGame();renderShop();
}

function buyTruckType(id){

function renderMap(){
updateTopBar();
const canvas = $('map-canvas');
const rect = canvas.parentElement.getBoundingClientRect();
const size = Math.min(rect.width - 32, 500);
canvas.width = size * 2; canvas.height = size * 2;
canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
const ctx = canvas.getContext('2d');
ctx.scale(2, 2);

// Background
ctx.fillStyle = '#c8e6c0';
ctx.fillRect(0, 0, size, size);

// Roads
ctx.strokeStyle='#d4c5a9'; ctx.lineWidth=6;
for(let i=0;i<6;i++){
const p=size*i/5;
ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,size);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(size,p);ctx.stroke();
}
// Road center lines
ctx.strokeStyle='#e8e0c8'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
for(let i=0;i<6;i++){
const p=size*i/5;
ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,size);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(size,p);ctx.stroke();
}
ctx.setLineDash([]);

// Decorative background houses (fixed positions)
const housePositions = [[0.12,0.15],[0.35,0.08],[0.7,0.2],[0.85,0.45],[0.15,0.55],[0.6,0.7],[0.9,0.85],[0.25,0.82],[0.55,0.4],[0.78,0.62]];
housePositions.forEach(([fx,fy])=>{
const hx=fx*size, hy=fy*size;
ctx.fillStyle='#ddd';
ctx.fillRect(hx,hy,10,8);
ctx.fillStyle='#b44';
ctx.beginPath();ctx.moveTo(hx-1,hy);ctx.lineTo(hx+5,hy-4);ctx.lineTo(hx+11,hy);ctx.fill();
});

// Your HQ
ctx.fillStyle='#2d5a27';
ctx.beginPath();ctx.arc(size/2,size/2,10,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=2;
ctx.beginPath();ctx.arc(size/2,size/2,10,0,Math.PI*2);ctx.stroke();
ctx.fillStyle='#fff';ctx.font='bold 7px Inter';ctx.textAlign='center';
ctx.fillText('HQ',size/2,size/2+2.5);

// Contract pins
G.contracts.forEach(c=>{
const x = (c.mapX/300)*size;
const y = (c.mapY/300)*size;
const mowed = G.weeklyMowed[c.id];
// Pin
ctx.fillStyle = mowed?'#4a8c3f':'#cc3333';
ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.stroke();
// Inner dot
ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();
// Label
ctx.fillStyle='#1a2e1a';ctx.font='bold 6px Inter';ctx.textAlign='center';
ctx.fillText(c.customerName.split(' ')[1],x,y-9);
});

// Legend
const ly = size - 30;
ctx.fillStyle='rgba(255,255,255,0.85)';
ctx.fillRect(5, ly-2, 120, 28);
ctx.fillStyle='#cc3333';ctx.beginPath();ctx.arc(15,ly+6,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#1a2e1a';ctx.font='7px Inter';ctx.textAlign='left';
ctx.fillText('Needs mowing',24,ly+9);
ctx.fillStyle='#4a8c3f';ctx.beginPath();ctx.arc(15,ly+18,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#1a2e1a';ctx.fillText('Done',24,ly+21);
}

// ===== MOWING MINI-GAME =====
let mowState = null;
let mowAnimFrame = null;
let joystickActive = false;
let joystickDX = 0, joystickDY = 0;
let joystickTouchId = null;
let joystickBaseX = 0, joystickBaseY = 0;
let throttleValue = 0.5; // 0-1
let throttleTouchId = null;
let keysDown = {};
let breakdownTimer = null;
// Twin lever system
let leverLeftValue = 0; // -1 to 1 (center=0=neutral, up=forward, down=reverse)
let leverRightValue = 0;
let leverLeftTouchId = null;
let leverRightTouchId = null;
let controlMode = 'joystick'; // 'joystick' (Country Clipper) or 'levers' (standard zero-turn)

function startMowing(contractId){
const c = G.contracts.find(c2=>String(c2.id)===String(contractId));
if(!c) return;

// Check if any mower is functional
const bestFunctional = G.mowers.filter(m=>m.owned && (m.health==null||m.health>0)).sort((a,b)=>b.efficiency-a.efficiency)[0];
if(!bestFunctional){
showModal(`<button class="modal-close" onclick="closeModal()">&times;</button><h2>No Working Mower!</h2><p>All your mowers are destroyed. Visit the shop to repair or buy a new one.</p>`);
return;
}

const yt = YARD_TYPES.find(y=>y.type===c.type);
const canvas = $('mow-canvas');
const screen = $('mowing-screen');

showScreen('mowing-screen');
$('bottom-nav').style.display='none';

// Control mode based on mower — Country Clipper gets single joystick (easier!), others get twin levers
const isClipper = bestFunctional.id && bestFunctional.id.includes('clipper');
controlMode = isClipper ? 'joystick' : 'levers';
// Show/hide controls
$('joystick-touch-area').style.display = controlMode === 'joystick' ? 'block' : 'none';
$('twin-levers').style.display = controlMode === 'levers' ? 'flex' : 'none';
// Reset levers
leverLeftValue = 0; leverRightValue = 0;
leverLeftTouchId = null; leverRightTouchId = null;
// Hide throttle slider in lever mode (levers control speed)
$('throttle-area').style.display = controlMode === 'levers' ? 'none' : 'block';

// Size canvas to screen
const w = window.innerWidth;
const h = window.innerHeight;
canvas.width = w * 2;
canvas.height = h * 2;
canvas.style.width = w + 'px';
canvas.style.height = h + 'px';

// Generate yard
const yardW = w;
const yardH = h;
const grassSize = 8; // size of each grass cell in canvas pixels (at 1x)
const cols = Math.floor(yardW / grassSize);
const rows = Math.floor(yardH / grassSize);

const grass = [];
for(let r=0;r<rows;r++){
grass[r]=[];
for(let cc=0;cc<cols;cc++){
grass[r][cc] = 1; // 1=uncut
}
}

// Border (not grass - driveway/house)
const houseH = Math.floor(rows * 0.1);
for(let r=0;r<houseH;r++) for(let cc=0;cc<cols;cc++) grass[r][cc]=0;
// Fence borders
for(let r=0;r<rows;r++){grass[r][0]=0;grass[r][cols-1]=0;}
for(let cc=0;cc<cols;cc++){grass[rows-1][cc]=0;}

// Obstacles
const obstacles = [];
const numObs = yt ? yt.obstacles : 3;
for(let i=0;i<numObs;i++){
const ox = rng(3,cols-4);
const oy = rng(houseH+3,rows-4);
const ow = rng(2,4);
const oh = rng(2,4);
const type = pick(['tree','flowerbed','rock']);
const flowers = [];
if(type==='flowerbed'){
for(let fi=0;fi<5;fi++) flowers.push({fx:rng(2,ow*8-2),fy:rng(2,oh*8-2),fc:pick(['#e44','#e8a','#fa5','#a5f','#ff6','#f6a'])});
}
obstacles.push({x:ox,y:oy,w:ow,h:oh,type,flowers});
for(let r=oy;r<Math.min(oy+oh,rows);r++)
for(let cc2=ox;cc2<Math.min(ox+ow,cols);cc2++)
grass[r][cc2] = 0; // not grass
}

// Count total grass
let totalGrass = 0;
for(let r=0;r<rows;r++) for(let cc=0;cc<cols;cc++) if(grass[r][cc]===1) totalGrass++;

// Get best functional mower
const bestMower = G.mowers.filter(m=>m.owned && (m.health==null||m.health>0)).sort((a,b)=>b.efficiency-a.efficiency)[0];
const mowerSpeed = bestMower ? (bestMower.speed / 7) * 3 : 3; // pixels per frame at 1x
const mowerWidth = bestMower ? (bestMower.deck / 42) * 3 : 3; // cells wide

const mowerHealth = bestMower ? (bestMower.health != null ? bestMower.health : 100) : 100;
const healthPenalty = mowerHealth < 50 ? 0.5 + (mowerHealth / 100) : 1;

mowState = {
contract: c,
yardType: yt,
canvas, w: yardW, h: yardH,
grassSize, cols, rows, grass,
totalGrass, cutGrass: 0,
obstacles,
mower: bestMower,
mowerSpeed,
baseMowerSpeed: mowerSpeed,
mowerWidth: Math.max(2, Math.round(mowerWidth)),
baseMowerWidth: Math.max(2, Math.round(mowerWidth)),
px: yardW / 2, py: yardH * 0.6,
angle: 0, drift: 0,
timer: 0, startTime: Date.now(),
done: false, hitCount: 0,
mowerHealth: mowerHealth,
healthPenalty: healthPenalty,
damageThisRun: 0,
brokeDown: false, breakdownEnd: 0,
lastCollision: 0,
particles: [],
stripes: []
};

throttleValue = 0.5;
$('throttle-fill').style.height = '50%';
$('throttle-handle').style.bottom = 'calc(50% - 7px)';
$('mow-complete').style.display='none';
$('breakdown-overlay').style.display='none';
$('mow-yard-name').textContent = c.customerName + ' - ' + c.label;
updateMowHUD();

// Start game loop
if(mowAnimFrame) cancelAnimationFrame(mowAnimFrame);
if(breakdownTimer) clearTimeout(breakdownTimer);
mowLoop();
}

function updateMowHUD(){
if(!mowState) return;
const h = mowState.mowerHealth;
const fill = $('hud-health-fill');
const text = $('hud-health-text');
fill.style.width = h + '%';
fill.style.background = h > 50 ? 'var(--success)' : h > 25 ? 'var(--warning)' : 'var(--danger)';
text.textContent = Math.round(h) + '%';
const speedPct = Math.round(throttleValue * 100);
const ctrlLabel = controlMode === 'levers' ? '🎚️ Twin Levers' : '🕹️ Joystick';
$('hud-speed').innerHTML = `&#9881; ${speedPct}% | ${ctrlLabel}${keysDown['Shift']?' BOOST':''}`;
}

function mowLoop(){
if(!mowState || mowState.done) return;
const ms = mowState;
const ctx = ms.canvas.getContext('2d');
const scale = 2;
ctx.save();
ctx.scale(scale, scale);

// Update timer
ms.timer = (Date.now() - ms.startTime) / 1000;
$('mow-timer').textContent = formatTime(ms.timer);

// Check breakdown
if(ms.brokeDown){
if(Date.now() < ms.breakdownEnd){
const secsLeft = Math.ceil((ms.breakdownEnd - Date.now())/1000);
$('breakdown-timer').textContent = secsLeft;
// Still draw the scene but don't move
drawMowScene(ctx, ms);
ctx.restore();
mowAnimFrame = requestAnimationFrame(mowLoop);
return;
} else {
ms.brokeDown = false;
$('breakdown-overlay').style.display='none';
}
}

// Random breakdown check (if health < 25%, chance each frame)
if(ms.mowerHealth > 0 && ms.mowerHealth < 25 && Math.random() < 0.0005){
ms.brokeDown = true;
ms.breakdownEnd = Date.now() + 10000;
$('breakdown-overlay').style.display='flex';
drawMowScene(ctx, ms);
ctx.restore();
mowAnimFrame = requestAnimationFrame(mowLoop);
return;
}

// Throttle-based speed
const boost = keysDown['Shift'] ? 1.5 : 1;
const speedMult = (0.3 + throttleValue * 1.4) * ms.healthPenalty * boost;
const currentSpeed = ms.baseMowerSpeed * speedMult;
ms.mowerSpeed = currentSpeed;

// Wider mowing path at higher throttle
const widthBonus = throttleValue > 0.7 ? Math.round((throttleValue - 0.7) * 3) : 0;
ms.mowerWidth = ms.baseMowerWidth + widthBonus;

// Drift at high speed
const driftAmount = throttleValue > 0.7 ? (throttleValue - 0.7) * 0.15 : 0;

// Move mower — twin levers (standard zero-turn) or joystick (Country Clipper)
let dx = 0, dy = 0;
if(controlMode === 'levers'){
const lev = getLeversAsDxDy();
dx = lev.dx; dy = lev.dy;
// Keyboard: Q/E or Z/C for individual levers, WASD still works as shortcut
if(keysDown['q']||keysDown['Q']) leverLeftValue = Math.min(1, leverLeftValue + 0.05);
if(keysDown['e']||keysDown['E']) leverRightValue = Math.min(1, leverRightValue + 0.05);
if(keysDown['z']||keysDown['Z']) leverLeftValue = Math.max(-1, leverLeftValue - 0.05);
if(keysDown['c']||keysDown['C']) leverRightValue = Math.max(-1, leverRightValue - 0.05);
// WASD as shortcut (both levers together)
if(keysDown['ArrowUp']||keysDown['w']||keysDown['W']){leverLeftValue=0.7;leverRightValue=0.7;}
if(keysDown['ArrowDown']||keysDown['s']||keysDown['S']){leverLeftValue=-0.5;leverRightValue=-0.5;}
if(keysDown['ArrowLeft']||keysDown['a']||keysDown['A']){leverLeftValue=-0.3;leverRightValue=0.5;}
if(keysDown['ArrowRight']||keysDown['d']||keysDown['D']){leverLeftValue=0.5;leverRightValue=-0.3;}
// Decay levers back to center when no keyboard input
if(!keysDown['q']&&!keysDown['Q']&&!keysDown['z']&&!keysDown['Z']&&
!keysDown['ArrowUp']&&!keysDown['w']&&!keysDown['W']&&
!keysDown['ArrowDown']&&!keysDown['s']&&!keysDown['S']&&
!keysDown['ArrowLeft']&&!keysDown['a']&&!keysDown['A']&&
!keysDown['ArrowRight']&&!keysDown['d']&&!keysDown['D']){
if(!leverLeftTouchId) leverLeftValue *= 0.85;
if(!leverRightTouchId) leverRightValue *= 0.85;
}
const lev2 = getLeversAsDxDy();
dx = lev2.dx; dy = lev2.dy;
// Auto throttle from lever intensity for levers mode
throttleValue = clamp(Math.abs((leverLeftValue+leverRightValue)/2), 0.1, 1);
} else {
// Joystick mode (Country Clipper — easier, more responsive)
if(joystickActive){ dx = joystickDX; dy = joystickDY; }
if(keysDown['ArrowUp']||keysDown['w']||keysDown['W']) dy=-1;
if(keysDown['ArrowDown']||keysDown['s']||keysDown['S']) dy=1;
if(keysDown['ArrowLeft']||keysDown['a']||keysDown['A']) dx=-1;
if(keysDown['ArrowRight']||keysDown['d']||keysDown['D']) dx=1;
}

const mag = Math.sqrt(dx*dx+dy*dy);
if(mag > 0){
dx/=mag; dy/=mag;
// Apply drift
if(driftAmount > 0){
ms.drift += (Math.random()-0.5) * driftAmount;
ms.drift *= 0.95;
const perpX = -dy, perpY = dx;
dx += perpX * ms.drift;
dy += perpY * ms.drift;
}
ms.angle = Math.atan2(dy, dx);
const nx = ms.px + dx * currentSpeed;
const ny = ms.py + dy * currentSpeed;

// Collision check with obstacles
let hitObstacle = false;
const mowerR = ms.grassSize * ms.mowerWidth / 2;
const now = Date.now();
ms.obstacles.forEach(ob=>{
const obL = ob.x * ms.grassSize;
const obT = ob.y * ms.grassSize;
const obR = (ob.x + ob.w) * ms.grassSize;
const obB = (ob.y + ob.h) * ms.grassSize;
if(nx + mowerR > obL && nx - mowerR < obR && ny + mowerR > obT && ny - mowerR < obB){
hitObstacle = true;
}
});

// Boundary collision (fence/house)
const hitBoundary = nx <= ms.grassSize || nx >= ms.w - ms.grassSize ||
ny <= ms.grassSize * Math.floor(ms.rows*0.1) || ny >= ms.h - ms.grassSize;

if(hitObstacle && now - ms.lastCollision > 500){
ms.lastCollision = now;
const dmg = Math.max(0.2, Math.round(10*(0.3 + throttleValue * 0.7) * (1 + (currentSpeed / ms.baseMowerSpeed - 1) * 0.3))/10);
ms.mowerHealth = Math.max(0, ms.mowerHealth - dmg);
ms.damageThisRun += dmg;
ms.hitCount++;
updateMowHUD();
// Damage flash particles
for(let i=0;i<3;i++) ms.particles.push({x:ms.px+rng(-8,8),y:ms.py+rng(-8,8),vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:15,size:rng(2,4),color:'#f44'});
if(ms.mowerHealth <= 0){
mowerDestroyed();
return;
}
}

if(hitBoundary && !hitObstacle && now - ms.lastCollision > 500){
ms.lastCollision = now;
const dmg = Math.max(0.3, Math.round(10*(0.5 + throttleValue * 0.5))/10);
ms.mowerHealth = Math.max(0, ms.mowerHealth - dmg);
ms.damageThisRun += dmg;
ms.hitCount++;
updateMowHUD();
for(let i=0;i<5;i++) ms.particles.push({x:ms.px+rng(-8,8),y:ms.py+rng(-8,8),vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:15,size:rng(2,4),color:'#f44'});
if(ms.mowerHealth <= 0){
mowerDestroyed();
return;
}
}

if(!hitObstacle && !hitBoundary){
ms.px = nx;
ms.py = ny;
}

// Cut grass under mower (skip if mower destroyed)
if(ms.mowerHealth > 0){
const cx2 = Math.floor(ms.px / ms.grassSize);
const cy2 = Math.floor(ms.py / ms.grassSize);
const hw = Math.floor(ms.mowerWidth / 2);
// Efficiency penalty when damaged
const cutChance = ms.mowerHealth < 50 ? 0.5 + ms.mowerHealth/100 : 1;
for(let r=cy2-hw;r<=cy2+hw;r++){
for(let c=cx2-hw;c<=cx2+hw;c++){
if(r>=0&&r<ms.rows&&c>=0&&c<ms.cols&&ms.grass[r][c]===1){
if(Math.random() < cutChance){
ms.grass[r][c] = 2;
ms.cutGrass++;
if(Math.random()<0.3){
ms.particles.push({
x:c*ms.grassSize+rng(-3,3),
y:r*ms.grassSize+rng(-3,3),
vx:(Math.random()-0.5)*2,
vy:-Math.random()*2-1,
life:20+rng(0,10),
size:rng(1,3)
});
}
}
}
}
}
}
}

updateMowHUD();

// Update particles
ms.particles = ms.particles.filter(p=>{
p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
return p.life>0;
});

// Progress
const progress = ms.totalGrass > 0 ? ms.cutGrass / ms.totalGrass : 0;
$('mow-progress').textContent = Math.round(progress*100)+'% Mowed';

drawMowScene(ctx, ms);
ctx.restore();

// Check completion
if(progress >= 0.95 && !ms.done){
completeMowing();
return;
}

mowAnimFrame = requestAnimationFrame(mowLoop);
}

function mowerDestroyed(){
const ms = mowState;
ms.done = true;
if(ms.mower) ms.mower.health = 0;
$('mow-complete').style.display='flex';
$('mow-complete').innerHTML = `
<h2 style="color:var(--danger)">Mower Destroyed!</h2>
<div style="font-size:3rem;margin:12px 0">&#128165;</div>
<div class="mow-stats">Your ${ms.mower?ms.mower.name:'mower'} is totaled.</div>
<div class="mow-stats">You'll need to repair or buy a new one.</div>
<div class="mow-stats" style="margin-top:8px">Coverage: ${Math.round((ms.cutGrass/ms.totalGrass)*100)}%</div>
<button onclick="exitMowing()">Back to Jobs</button>`;
saveGame();
}

function drawMowScene(ctx, ms){
// Sky/ground
ctx.fillStyle='#4a7a3a';
ctx.fillRect(0,0,ms.w,ms.h);

// Draw grass
for(let r=0;r<ms.rows;r++){
for(let c=0;c<ms.cols;c++){
const x=c*ms.grassSize, y=r*ms.grassSize;
if(ms.grass[r][c]===0){
if(r < Math.floor(ms.rows*0.1)){
ctx.fillStyle='#b0a080';
} else {
ctx.fillStyle='#8a7a5a';
}
ctx.fillRect(x,y,ms.grassSize,ms.grassSize);
} else if(ms.grass[r][c]===1){
const shade = ((r+c)%3===0)?'#3a8a2a':((r+c)%3===1)?'#45952f':'#4da035';
ctx.fillStyle=shade;
ctx.fillRect(x,y,ms.grassSize,ms.grassSize);
if((r+c)%4===0){
ctx.fillStyle='#2d7a1f';
ctx.fillRect(x+2,y,1,ms.grassSize-2);
}
} else {
const stripe = (r % 4 < 2);
ctx.fillStyle = stripe ? '#7ab86a' : '#85c476';
ctx.fillRect(x,y,ms.grassSize,ms.grassSize);
}
}
}

// Draw house at top
const houseTop = 0;
const houseBtm = Math.floor(ms.rows*0.1)*ms.grassSize;
ctx.fillStyle='#c4a882';
ctx.fillRect(ms.w*0.15, houseTop, ms.w*0.7, houseBtm);
ctx.fillStyle='#8B4513';
ctx.beginPath();
ctx.moveTo(ms.w*0.1, houseBtm*0.3);
ctx.lineTo(ms.w*0.5, houseTop+2);
ctx.lineTo(ms.w*0.9, houseBtm*0.3);
ctx.closePath();
ctx.fill();
ctx.fillStyle='#5a3520';
ctx.fillRect(ms.w*0.46, houseBtm*0.45, ms.w*0.08, houseBtm*0.55);
ctx.fillStyle='#87CEEB';
ctx.fillRect(ms.w*0.25, houseBtm*0.45, ms.w*0.1, houseBtm*0.3);
ctx.fillRect(ms.w*0.65, houseBtm*0.45, ms.w*0.1, houseBtm*0.3);
ctx.fillStyle='#a0a0a0';
ctx.fillRect(ms.w*0.42, houseBtm, ms.w*0.16, ms.grassSize*2);

// Draw obstacles
ms.obstacles.forEach(ob=>{
const x=ob.x*ms.grassSize, y=ob.y*ms.grassSize;
const w2=ob.w*ms.grassSize, h2=ob.h*ms.grassSize;
if(ob.type==='tree'){
ctx.fillStyle='rgba(0,0,0,0.1)';
ctx.beginPath();ctx.ellipse(x+w2/2,y+h2*0.85,w2*0.45,h2*0.15,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#5a3a1a';
ctx.fillRect(x+w2*0.35,y+h2*0.35,w2*0.3,h2*0.65);
ctx.fillStyle='#2d6a1a';
ctx.beginPath();ctx.arc(x+w2/2,y+h2*0.3,w2*0.55,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#3a8a2a';
ctx.beginPath();ctx.arc(x+w2*0.4,y+h2*0.25,w2*0.35,0,Math.PI*2);ctx.fill();
} else if(ob.type==='flowerbed'){
ctx.fillStyle='#6a4a2a';
ctx.fillRect(x,y,w2,h2);
ctx.fillStyle='#5a3a1a';
ctx.fillRect(x+1,y+1,w2-2,h2-2);
(ob.flowers||[]).forEach(f=>{
ctx.fillStyle=f.fc;
ctx.beginPath();ctx.arc(x+f.fx,y+f.fy,2.5,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#3a7a2a';
ctx.fillRect(x+f.fx-0.5,y+f.fy+2,1,3);
});
} else {
ctx.fillStyle='#888';
ctx.beginPath();ctx.ellipse(x+w2/2,y+h2/2,w2/2,h2/2,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#999';
ctx.beginPath();ctx.ellipse(x+w2/2,y+h2*0.4,w2*0.4,h2*0.3,0,0,Math.PI*2);ctx.fill();
}
});

// Draw particles
ms.particles.forEach(p=>{
ctx.globalAlpha=p.life/30;
ctx.fillStyle=p.color||'#6db85a';
ctx.fillRect(p.x,p.y,p.size,p.size);
});
ctx.globalAlpha=1;

// Draw mower
ctx.save();
ctx.translate(ms.px, ms.py);
ctx.rotate(ms.angle);
const mowerR = ms.grassSize * ms.mowerWidth / 2;
ctx.fillStyle='rgba(0,0,0,0.15)';
ctx.beginPath();ctx.ellipse(1,2,mowerR+2,mowerR*0.7,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#555';
ctx.beginPath();
ctx.roundRect(-mowerR-2, -mowerR*0.5, mowerR*0.8, mowerR*1, [3]);
ctx.fill();
// Body color based on health
const bodyColor = ms.mowerHealth > 50 ? '#cc3333' : ms.mowerHealth > 25 ? '#cc8833' : '#884444';
ctx.fillStyle=bodyColor;
ctx.beginPath();
ctx.roundRect(-mowerR*0.4, -mowerR*0.7, mowerR*1.8, mowerR*1.4, [4]);
ctx.fill();
ctx.fillStyle='#222';
ctx.fillRect(mowerR*0.5, -mowerR*0.5, mowerR*0.6, mowerR*1);
ctx.fillStyle='#1a1a1a';
ctx.beginPath();
ctx.roundRect(-mowerR*0.1, -mowerR*0.35, mowerR*0.5, mowerR*0.7, [3]);
ctx.fill();
ctx.fillStyle='#333';
ctx.beginPath();ctx.arc(-mowerR*0.2, -mowerR*0.7, 3, 0, Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(-mowerR*0.2, mowerR*0.7, 3, 0, Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(mowerR*0.9, -mowerR*0.6, 4, 0, Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(mowerR*0.9, mowerR*0.6, 4, 0, Math.PI*2);ctx.fill();
// Damage smoke when health low
if(ms.mowerHealth < 40){
ctx.globalAlpha = 0.3;
ctx.fillStyle='#888';
const st = Date.now()/200;
ctx.beginPath();ctx.arc(mowerR*0.6+Math.sin(st)*3, -mowerR*0.3+Math.cos(st)*2-5, 4+Math.sin(st*1.3)*2, 0, Math.PI*2);ctx.fill();
ctx.globalAlpha = 1;
}
ctx.restore();
}

function formatTime(s){
const m=Math.floor(s/60);const sec=Math.floor(s%60);
return m+':'+(sec<10?'0':'')+sec;
}

function completeMowing(){
mowState.done = true;
const ms = mowState;
const c = ms.contract;
const yt = ms.yardType;

// Calculate performance
const cutPercent = ms.cutGrass / ms.totalGrass;
const baseTime = yt ? yt.baseTime : 60;
const efficiency = ms.mower ? ms.mower.efficiency : 1;
const targetTime = baseTime / efficiency;
const timeBonus = ms.timer < targetTime ? Math.round((targetTime - ms.timer) * 0.5) : 0;

// Stars rating
let stars = 3;
if(cutPercent > 0.98) stars++;
if(ms.hitCount === 0 && ms.timer < targetTime * 1.5) stars++;
if(cutPercent < 0.96) stars--;
if(ms.damageThisRun > 15) stars--;
stars = clamp(stars, 1, 5);

// Update satisfaction
c.satisfaction = clamp(Math.round((c.satisfaction * 0.7) + (stars * 0.3)), 1, 5);
G.weeklyMowed[c.id] = 'owner';

// Gas cost (affected by throttle and route distance)
const gasCost = calcContractGasCost(c) * (1 + (throttleValue - 0.5) * 0.5);
G.weekGas += gasCost;

// Save mower health back to game state
if(ms.mower){
const gMower = G.mowers.find(m=>m.id===ms.mower.id && m.owned);
if(gMower) gMower.health = ms.mowerHealth;
}

// Track reputation
G.totalRepJobs++;
G.totalRepScore += stars;
G.reputation = clamp(G.totalRepScore / G.totalRepJobs, 1, 5);

// Show complete overlay
const starStr = '\u2B50'.repeat(stars) + '\u2606'.repeat(5-stars);
const healthWarning = ms.mowerHealth < 25 ? '<div class="mow-stats" style="color:var(--danger)">&#9888; Mower critically damaged!</div>' :
ms.mowerHealth < 50 ? '<div class="mow-stats" style="color:var(--warning)">&#9888; Mower needs repair</div>' : '';
$('mow-complete').style.display='flex';
$('mow-complete').innerHTML = `
<h2>Yard Complete!</h2>
<div class="stars">${starStr}</div>
<div class="mow-stats">Coverage: ${Math.round(cutPercent*100)}%</div>
<div class="mow-stats">Time: ${formatTime(ms.timer)}</div>
<div class="mow-stats">Gas Cost: ${fmt(gasCost)}</div>
<div class="mow-stats">Mower Health: ${Math.round(ms.mowerHealth)}%${ms.damageThisRun>0?' (-'+ms.damageThisRun+'%)':''}</div>
${healthWarning}
${timeBonus > 0 ? `<div class="mow-stats" style="color:#6db85a">Speed Bonus: +${fmt(timeBonus)}</div>` : ''}
<button onclick="exitMowing()">Continue</button>
`;

saveGame();
}

function exitMowing(){
mowState = null;
if(mowAnimFrame) cancelAnimationFrame(mowAnimFrame);
$('bottom-nav').style.display='flex';
showScreen('contracts');
}

// ===== DYNAMIC JOYSTICK (spawn-on-touch) =====
const jTouchArea = $('joystick-touch-area');
const dynBase = $('dyn-joystick-base');
const dynKnob = $('dyn-joystick-knob');

jTouchArea.addEventListener('touchstart', e=>{
e.preventDefault();
if(joystickTouchId !== null) return;
const t = e.changedTouches[0];
joystickTouchId = t.identifier;
joystickActive = true;
joystickBaseX = t.clientX;
joystickBaseY = t.clientY;
dynBase.style.display = 'block';
dynBase.style.left = (t.clientX - 60) + 'px';
dynBase.style.top = (t.clientY - 60) + 'px';
dynKnob.style.left = '35px';
dynKnob.style.top = '35px';
}, {passive:false});

jTouchArea.addEventListener('touchmove', e=>{
e.preventDefault();
for(let i=0;i<e.changedTouches.length;i++){
const t = e.changedTouches[i];
if(t.identifier !== joystickTouchId) continue;
const dx = t.clientX - joystickBaseX;
const dy = t.clientY - joystickBaseY;
const dist = Math.sqrt(dx*dx+dy*dy);
const maxDist = 40;
const clampedDist = Math.min(dist, maxDist);
const angle = Math.atan2(dy, dx);
const nx = Math.cos(angle) * clampedDist;
const ny = Math.sin(angle) * clampedDist;
dynKnob.style.left = (35 + nx) + 'px';
dynKnob.style.top = (35 + ny) + 'px';
joystickDX = nx / maxDist;
joystickDY = ny / maxDist;
}
}, {passive:false});

jTouchArea.addEventListener('touchend', e=>{
e.preventDefault();
for(let i=0;i<e.changedTouches.length;i++){
if(e.changedTouches[i].identifier === joystickTouchId){
joystickTouchId = null;
joystickActive = false;
joystickDX = 0; joystickDY = 0;
dynBase.style.display = 'none';
}
}
}, {passive:false});

// Desktop mouse fallback for joystick
jTouchArea.addEventListener('mousedown', e=>{
joystickActive = true;
joystickBaseX = e.clientX;
joystickBaseY = e.clientY;
dynBase.style.display = 'block';
dynBase.style.left = (e.clientX - 60) + 'px';
dynBase.style.top = (e.clientY - 60) + 'px';
dynKnob.style.left = '35px';
dynKnob.style.top = '35px';
const mm = e2=>{
const dx = e2.clientX - joystickBaseX;
const dy = e2.clientY - joystickBaseY;
const dist = Math.sqrt(dx*dx+dy*dy);
const maxDist = 40;
const clampedDist = Math.min(dist, maxDist);
const angle = Math.atan2(dy, dx);
const nx = Math.cos(angle) * clampedDist;
const ny = Math.sin(angle) * clampedDist;
dynKnob.style.left = (35 + nx) + 'px';
dynKnob.style.top = (35 + ny) + 'px';
joystickDX = nx / maxDist;
joystickDY = ny / maxDist;
};
const mu = ()=>{
joystickActive = false;
joystickDX = 0; joystickDY = 0;
dynBase.style.display = 'none';
document.removeEventListener('mousemove', mm);
document.removeEventListener('mouseup', mu);
};
document.addEventListener('mousemove', mm);
document.addEventListener('mouseup', mu);
});

// ===== THROTTLE SLIDER =====
const throttleTrack = $('throttle-track');
const throttleFill = $('throttle-fill');
const throttleHandle = $('throttle-handle');

function updateThrottleUI(){
throttleFill.style.height = (throttleValue*100) + '%';
throttleHandle.style.bottom = 'calc(' + (throttleValue*100) + '% - 7px)';
}

throttleTrack.addEventListener('touchstart', e=>{
e.preventDefault(); e.stopPropagation();
throttleTouchId = e.changedTouches[0].identifier;
handleThrottleTouch(e.changedTouches[0]);
}, {passive:false});

throttleTrack.addEventListener('touchmove', e=>{
e.preventDefault(); e.stopPropagation();
for(let i=0;i<e.changedTouches.length;i++){
if(e.changedTouches[i].identifier === throttleTouchId) handleThrottleTouch(e.changedTouches[i]);
}
}, {passive:false});

throttleTrack.addEventListener('touchend', e=>{
for(let i=0;i<e.changedTouches.length;i++){
if(e.changedTouches[i].identifier === throttleTouchId) throttleTouchId = null;
}
}, {passive:false});

throttleTrack.addEventListener('mousedown', e=>{
handleThrottleMouse(e);
const mm = e2=>handleThrottleMouse(e2);
const mu = ()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
document.addEventListener('mousemove',mm);
document.addEventListener('mouseup',mu);
});

function handleThrottleTouch(t){
const rect = throttleTrack.getBoundingClientRect();
const y = clamp((rect.bottom - t.clientY) / rect.height, 0, 1);
throttleValue = y;
updateThrottleUI();
}

function handleThrottleMouse(e){
const rect = throttleTrack.getBoundingClientRect();
const y = clamp((rect.bottom - e.clientY) / rect.height, 0, 1);
throttleValue = y;
updateThrottleUI();
}

// Keyboard controls
document.addEventListener('keydown',e=>{keysDown[e.key]=true});
document.addEventListener('keyup',e=>{delete keysDown[e.key]});

// Twin lever touch handling
function setupLeverTouch(side){
const el = $(side === 'L' ? 'lever-left' : 'lever-right');
if(!el) return;
const handle = $(side === 'L' ? 'lever-handle-L' : 'lever-handle-R');
function updateLever(clientY){
const rect = el.querySelector('.lever-track').getBoundingClientRect();
const pct = clamp((rect.top + rect.height/2 - clientY) / (rect.height/2), -1, 1);
if(side==='L') leverLeftValue = pct;
else leverRightValue = pct;
const topPct = 50 - pct * 45;
handle.style.top = topPct + '%';
handle.style.marginTop = '-10px';
}
el.addEventListener('touchstart', e=>{
e.preventDefault(); e.stopPropagation();
const t = e.changedTouches[0];
if(side==='L') leverLeftTouchId = t.identifier;
else leverRightTouchId = t.identifier;
updateLever(t.clientY);
},{passive:false});
el.addEventListener('touchmove', e=>{
e.preventDefault(); e.stopPropagation();
const tid = side==='L' ? leverLeftTouchId : leverRightTouchId;
for(let i=0;i<e.changedTouches.length;i++){
if(e.changedTouches[i].identifier === tid) updateLever(e.changedTouches[i].clientY);
}
},{passive:false});
el.addEventListener('touchend', e=>{
e.preventDefault();
const tid = side==='L' ? leverLeftTouchId : leverRightTouchId;
for(let i=0;i<e.changedTouches.length;i++){
if(e.changedTouches[i].identifier === tid){
if(side==='L'){leverLeftTouchId=null;leverLeftValue=0;}
else{leverRightTouchId=null;leverRightValue=0;}
handle.style.top='50%';
}
}
},{passive:false});
}
setupLeverTouch('L');
setupLeverTouch('R');

// Convert twin levers to dx/dy (tank-drive: both forward=straight, one forward+one back=turn)
function getLeversAsDxDy(){
const avg = (leverLeftValue + leverRightValue) / 2; // forward speed
const diff = (leverRightValue - leverLeftValue); // turn rate
// Convert to dx/dy based on current mower angle
if(Math.abs(avg) < 0.05 && Math.abs(diff) < 0.05) return {dx:0,dy:0,turn:0};
return {dx: diff * 0.8, dy: -avg, turn: diff};
}

// ===== ADVANCE WEEK =====
function advanceWeek(){
const unmowed = G.contracts.filter(c=>!G.weeklyMowed[c.id]).length;
if(unmowed > 0 && G.season !== 'Winter') return;

G.weekEvents = [];
let revenue = 0;
let expenses = 0;
let gasCost = G.weekGas || 0;
let wagesCost = 0;
let maintenanceCost = 0;

if(G.season !== 'Winter'){
// Revenue from mowed yards
G.contracts.forEach(c=>{
if(G.weeklyMowed[c.id]){
revenue += c.price;
c.weeksActive++;
}
});

// Employee wages
G.employees.forEach(e=>{
const hoursPerYard = e.level==='Expert'?1.5:e.level==='Experienced'?2:2.5;
const hours = e.assignedContracts.length * hoursPerYard;
const wage = hours * e.wage;
wagesCost += wage;

// Employee quality check + mower wear from skill
e.assignedContracts.forEach(cid=>{
const contract = G.contracts.find(c2=>String(c2.id)===String(cid));
if(!contract) return;
let quality = 3;
const skill = e.skill || 0.7;
if(e.level==='Expert') quality = rng(4,5);
else if(e.level==='Experienced') quality = rng(3,5);
else quality = rng(2,4);
// Morale affects quality
if(e.morale < 50) quality = Math.max(1, quality-1);
contract.satisfaction = clamp(Math.round((contract.satisfaction + quality)/2),1,5);
G.totalRepJobs++;
G.totalRepScore += quality;
// Mower wear from employee — lower skill = more damage
const diffMult = contract.difficulty==='hard'?1.5:contract.difficulty==='moderate'?1:0.7;
const mowerDmg = Math.round(10 * (1.2 - skill) * diffMult) / 10;
// Apply to the employee's assigned mower (first owned mower for now)
const empMower = G.mowers.find(m=>m.owned && (m.health||100) > 0);
if(empMower) empMower.health = Math.max(0, (empMower.health||100) - mowerDmg);
});
});

// Gas for employee-mowed yards (uses route system)
G.employees.forEach(e=>{
const truck = getEmployeeTruck(e.id);
e.assignedContracts.forEach(cid=>{
const contract = G.contracts.find(c2=>String(c2.id)===String(cid));
if(contract){
gasCost += calcContractGasCost(contract);
// Truck gas cost
if(truck) gasCost += truck.gasCost / Math.max(1, e.assignedContracts.length);
}
});
// Truck reliability check - may miss jobs
if(truck && e.assignedContracts.length > 0){
if(Math.random() > truck.reliability){
const missedIdx = rng(0, e.assignedContracts.length - 1);
const missedCid = e.assignedContracts[missedIdx];
const missedContract = G.contracts.find(c2=>String(c2.id)===String(missedCid));
delete G.weeklyMowed[missedCid];
if(missedContract){
missedContract.satisfaction = Math.max(1, missedContract.satisfaction - 1);
G.weekEvents.push({text:`${truck.name} broke down! ${e.name} missed ${missedContract.customerName}'s yard.`,type:'bad'});
}
}
}
});

// Route bonus discount on gas
const route = calcRouteInfo();
if(route.bonus){
gasCost = Math.round(gasCost * 0.85 * 100)/100;
G.weekEvents.push({text:'Route bonus! Clustered jobs saved fuel.',type:'good'});
}

// Maintenance
maintenanceCost = revenue * 0.05;
G.mowers.forEach(m=>{
if(m.owned){
m.condition = Math.max(0, m.condition - rng(1,3));
// Health also degrades slightly from normal wear
if(m.health == null) m.health = 100;
m.health = Math.max(0, m.health - rng(0,2));
}
});
}

// Fixed expenses
let insuranceCost = G.insurance / 4;
let loanPayment = 0;
if(G.mowerLoan > 0){
loanPayment = Math.min(G.mowerLoanPayment, G.mowerLoan);
G.mowerLoan -= loanPayment;
if(G.mowerLoan <= 0){
G.mowerLoan = 0;
G.weekEvents.push({text:'Mower loan paid off!',type:'good'});
}
}

// Truck loan payments
let truckPay = 0;
(G.ownedTrucks||[]).forEach(t=>{
if(t.loanLeft > 0){
const payment = Math.min(t.monthlyPayment / 4, t.loanLeft);
truckPay += payment;
t.loanLeft -= payment;
if(t.loanLeft <= 0){
t.loanLeft = 0;
G.weekEvents.push({text:`${t.name} loan paid off!`,type:'good'});
}
}
});
let websiteCost = G.hasWebsite ? G.websiteCost / 4 : 0;
let adCost = 0;
if(G.advertisingActive==='Local Ads' && G.advertisingWeeksLeft > 0){
adCost = 200;
G.advertisingWeeksLeft--;
if(G.advertisingWeeksLeft <= 0) G.advertisingActive = null;
}

expenses = gasCost + wagesCost + maintenanceCost + insuranceCost + loanPayment + truckPay + websiteCost + adCost;

// Net income
const net = revenue - expenses;
G.cash += net;
G.totalRevenue += revenue;
G.weekRevenue = revenue;
G.weekExpenses = expenses;
G.weekGas = 0;
G.weekWages = wagesCost;
G.weekMaintenance = maintenanceCost;

// Update reputation
if(G.totalRepJobs > 0) G.reputation = clamp(G.totalRepScore / G.totalRepJobs, 1, 5);

// RANDOM EVENTS
if(G.season !== 'Winter'){
// Weather effects
if(G.weather==='storm'){
if(Math.random()<0.3){
const m = G.mowers.find(m2=>m2.owned);
if(m){m.condition = Math.max(0,m.condition-rng(10,25));G.weekEvents.push({text:`Storm damaged your ${m.name}!`,type:'bad'})}
}
}

// Mower breakdown
G.mowers.forEach(m=>{
if(m.owned && m.condition < 30 && Math.random()<0.3){
const repairCost = Math.round(m.price * 0.1);
G.cash -= repairCost;
expenses += repairCost;
m.condition = Math.min(100, m.condition + 40);
G.weekEvents.push({text:`${m.name} broke down! Repair cost: ${fmt(repairCost)}`,type:'bad'});
}
});

// Employee no-show
G.employees.forEach(e=>{
if(Math.random()<0.05){
e.morale = Math.max(20, e.morale - 15);
G.weekEvents.push({text:`${e.name} called in sick this week.`,type:'bad'});
}
});

// Referrals from happy customers
G.contracts.forEach(c=>{
if(c.satisfaction >= 4 && Math.random()<0.15){
const nc = generateContract();
G.pendingContracts.push(nc);
G.weekEvents.push({text:`${c.customerName} referred a friend! New lead available.`,type:'good'});
}
});

// Customer cancellation
G.contracts = G.contracts.filter(c=>{
if(c.satisfaction <= 1 && Math.random()<0.5){
G.weekEvents.push({text:`${c.customerName} cancelled - unsatisfied with service.`,type:'bad'});
G.reputation = Math.max(1, G.reputation - 0.2);
return false;
}
return true;
});
}

// Advertising leads
if(G.advertisingActive==='Local Ads'){
const newLeads = rng(1,3);
for(let i=0;i<newLeads;i++) G.pendingContracts.push(generateContract());
G.weekEvents.push({text:`Your ads brought in ${newLeads} new lead${newLeads>1?'s':''}!`,type:'good'});
}
if(G.hasWebsite && Math.random()<0.4){
G.pendingContracts.push(generateContract());
G.weekEvents.push({text:'New lead from your website!',type:'good'});
}

// Advance week
G.week++;
G.season = getSeason(G.week);
G.weather = pick(WEATHER_TYPES);
G.weeklyMowed = {};

// Insurance grows with company
G.insurance = 150 + G.employees.length * 50 + G.contracts.length * 5;

// Employee morale recovery
G.employees.forEach(e=>{ e.morale = Math.min(100, e.morale + rng(2,5)); });

// Gas price fluctuation ($2.50 - $5.00)
if(!G.gasPrice) G.gasPrice = 3.50;
const gasDelta = (Math.random() - 0.5) * 0.40;
G.gasPrice = clamp(Math.round((G.gasPrice + gasDelta)*100)/100, 2.50, 5.00);

// Mower health warnings
G.mowers.forEach(m=>{
if(m.owned && (m.health||100) <= 0){
G.weekEvents.push({text:`${m.name} is destroyed! Buy a new one or repair it.`,type:'bad'});
}else if(m.owned && (m.health||100) < 25){
G.weekEvents.push({text:`${m.name} is critically damaged (${Math.round(m.health)}%) - could break down any time!`,type:'bad'});
}
});

// Seasonal effects
if(G.season === 'Winter'){
G.weekEvents.push({text:'Winter has arrived. No mowing this season - plan for spring!',type:'neutral'});
}

// Show summary
showWeekSummary(revenue, gasCost, wagesCost, maintenanceCost, insuranceCost, loanPayment, truckPay, websiteCost, adCost, net);
saveGame();
}

function showWeekSummary(revenue, gas, wages, maint, insurance, loan, truck, website, ads, net){
$('summary-week-num').textContent = `Week ${G.week - 1} Complete`;

let html = '';

// Revenue card
html += `<div class="summary-card"><h3>Revenue</h3>`;
html += `<div class="summary-line"><span>Mowing Income</span><span class="positive">+${fmt(revenue)}</span></div>`;
html += `</div>`;

// Expenses card
html += `<div class="summary-card"><h3>Expenses</h3>`;
if(gas > 0) html += `<div class="summary-line"><span>Fuel</span><span class="negative">-${fmt(gas)}</span></div>`;
if(wages > 0) html += `<div class="summary-line"><span>Employee Wages</span><span class="negative">-${fmt(wages)}</span></div>`;
if(maint > 0) html += `<div class="summary-line"><span>Maintenance</span><span class="negative">-${fmt(maint)}</span></div>`;
if(insurance > 0) html += `<div class="summary-line"><span>Insurance</span><span class="negative">-${fmt(insurance)}</span></div>`;
if(loan > 0) html += `<div class="summary-line"><span>Mower Loan</span><span class="negative">-${fmt(loan)}</span></div>`;
if(truck > 0) html += `<div class="summary-line"><span>Truck Payment</span><span class="negative">-${fmt(truck)}</span></div>`;
if(website > 0) html += `<div class="summary-line"><span>Website</span><span class="negative">-${fmt(website)}</span></div>`;
if(ads > 0) html += `<div class="summary-line"><span>Advertising</span><span class="negative">-${fmt(ads)}</span></div>`;
html += `<div class="summary-line total"><span>Net Income</span><span class="${net>=0?'positive':'negative'}">${net>=0?'+':''}${fmt(net)}</span></div>`;
html += `</div>`;

// Events
if(G.weekEvents.length > 0){
html += `<div class="summary-card"><h3>Events</h3>`;
G.weekEvents.forEach(ev=>{
const icon = ev.type==='good'?'\u2705':ev.type==='bad'?'\u26A0\uFE0F':'\u2139\uFE0F';
html += `<div class="summary-event ${ev.type}">${icon} ${ev.text}</div>`;
});
html += `</div>`;
}

// Status
html += `<div class="summary-card"><h3>Business Status</h3>
<div class="summary-line"><span>Cash</span><span>${fmt(G.cash)}</span></div>
<div class="summary-line"><span>Contracts</span><span>${G.contracts.length}</span></div>
<div class="summary-line"><span>Employees</span><span>${G.employees.length}</span></div>
<div class="summary-line"><span>Reputation</span><span>${G.reputation.toFixed(1)} \u2B50</span></div>
<div class="summary-line"><span>Season</span><span>${SEASON_ICONS[G.season]} ${G.season}</span></div>
</div>`;

$('summary-body').innerHTML = html;
showScreen('week-summary');
$('bottom-nav').style.display='none';
}

function closeSummary(){
$('bottom-nav').style.display='flex';
showScreen('dashboard');
}

// Prevent default touch scrolling on game canvas
$('mow-canvas').addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// Window resize handler for mowing
window.addEventListener('resize',()=>{
if(mowState && !mowState.done){
const canvas = mowState.canvas;
const w = window.innerWidth;
const h = window.innerHeight;
canvas.width = w*2; canvas.height = h*2;
canvas.style.width = w+'px'; canvas.style.height = h+'px';
}
});

</script>
